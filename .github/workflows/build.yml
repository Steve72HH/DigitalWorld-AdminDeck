name: Build Digital World AdminDeck

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate config
        run: python -m json.tool app/config.apps.json

      - name: Syntax check
        run: python -m py_compile app/DigitalWorld-AdminDeck.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pyinstaller
          python -m pip install -r app/requirements.txt

      - name: Build EXE
        run: pyinstaller --noconfirm --windowed --name "DigitalWorld-AdminDeck" app/DigitalWorld-AdminDeck.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigitalWorld-AdminDeck-Windows
          path: dist/DigitalWorld-AdminDeck/
